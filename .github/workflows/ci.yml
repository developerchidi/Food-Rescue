# N11CT2-56 — Monorepo: chạy npm/eslint/tsc/build trong thư mục Frontend
name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    env:
      AUTH_SECRET: ci-build-placeholder-secret-32chars-minimum-xx
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      BACKEND_INTERNAL_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ci-dummy
      CLOUDINARY_API_KEY: ci-dummy
      CLOUDINARY_API_SECRET: ci-dummy

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
